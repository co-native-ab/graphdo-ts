name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
      - name: Stamp version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version: $VERSION"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Create MCPB bundle
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: npx @anthropic-ai/mcpb@latest pack . "graphdo-ts-${TAG_NAME}.mcpb"
      - name: Generate checksums
        run: sha256sum graphdo-ts-*.mcpb > checksums-sha256.txt
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            graphdo-ts-*.mcpb
            checksums-sha256.txt
